[package]
name = "nofs"
version = "0.1.0"
edition = "2021"
description = "A lightweight union filesystem tool - mergerfs alternative without FUSE"
license = "MIT"

[dependencies]
clap = { version = "4.4", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
walkdir = "2.4"
glob = "0.3"
human-size = "0.4"
anyhow = "1.0"
thiserror = "1.0"
libc = "0.2"
rand = "0.8"

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
