name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            --repo ${{ github.repository }} || true

  build_and_upload:
    name: Build and Upload
    needs: create_release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: nofs
            asset_name: nofs-linux-amd64
          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            artifact_name: nofs
            asset_name: nofs-freebsd-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: nofs
            asset_name: nofs-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: nofs
            asset_name: nofs-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: nofs.exe
            asset_name: nofs-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload to Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ./${{ matrix.asset_name }}
          gh release upload ${{ github.ref_name }} ./${{ matrix.asset_name }} --repo ${{ github.repository }}
