name: CI

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Build
      run: cargo build --verbose

    - name: Run tests
      run: cargo test --verbose

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            --repo ${{ github.repository }} || true

  build_and_upload:
    name: Build and Upload
    needs: create_release
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: nofs
            asset_name: nofs-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: nofs
            asset_name: nofs-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: nofs
            asset_name: nofs-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: nofs.exe
            asset_name: nofs-windows-amd64.exe

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload to Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ./${{ matrix.asset_name }}
          gh release upload ${{ github.ref_name }} ./${{ matrix.asset_name }} --repo ${{ github.repository }}
